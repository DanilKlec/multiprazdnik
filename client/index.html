<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script>
      // Polyfill/fix for environments where window.fetch has only a getter and throws errors on assignment
      try {
        const originalFetch = window.fetch;
        Object.defineProperty(window, 'fetch', {
          value: originalFetch,
          writable: true,
          configurable: true
        });
      } catch (e) {
        // Silently catch and proceed
      }
    </script>
    <title>Мультипраздник — Студия детских праздников в Тирасполе</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
